# Local MySQL for DriveClear (DataGrip + Django)
# Start: docker compose up -d
# Stop:  docker compose down

services:
  mysql:
    image: mysql:8.4
    container_name: driveclear-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: driveclear_root
      MYSQL_DATABASE: driveclear
      MYSQL_USER: driveclear
      MYSQL_PASSWORD: driveclear
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - driveclear_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-pdriveclear_root"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  driveclear_mysql_data:
