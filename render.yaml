# FREE Render deploy — web service only ($0/month)
# MySQL runs on Aiven free tier (external). No Redis needed (uses in-memory cache).

services:
  - type: web
    name: driveclear-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /api/v1/health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: SECURE_SSL_REDIRECT
        value: "false"
      - key: FIREBASE_PROJECT_ID
        value: driveclear-82af6
      - key: SMS_PROVIDER
        value: mock
      - key: EXTERNAL_CHALLAN_API_URL
        value: https://www.challanpay.in/api/d-to-c/user-verification
      - key: EXTERNAL_CHALLAN_FIND_URL
        value: https://www.challanpay.in/api/d-to-c/find-challans
      - key: EXTERNAL_CHALLAN_UTM_SOURCE
        value: challanpay
      - key: CHALLAN_FETCH_CACHE_DAYS
        value: "3"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: MSG91_AUTH_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: API_PAYLOAD_ENCRYPTION_ENABLED
        sync: false
      - key: API_PAYLOAD_ENCRYPTION_KEY
        sync: false
